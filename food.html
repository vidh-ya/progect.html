    body { font-family: Arial, 
    sans-serif; margin: 0; 
    background: #f9f9f9; }
    header { background: #ff5722; 
    color: white;
     padding: 15px; 
    text-align: center; }
    .menu { display: flex; 
    flex-wrap: wrap; 
    gap: 20px; 
    padding: 20px; 
    justify-content: center; }
    .item { background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); width: 220px; text-align: center; padding: 15px; }
    .item img { width: 100%; height: 140px; object-fit: cover; border-radius: 6px; }
    .item h3 { margin: 10px 0; }
    .item p { font-weight: bold; }
    button { background: #ff5722; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; }
    button:hover { background: #e64a19; }
    .cart { background: #fff3e0; padding: 20px; margin: 20px; border-radius: 8px; }
    .checkout { background: #fff; padding: 20px; margin: 20px; border-radius: 8px; }
    input, textarea { width: 100%; padding: 8px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; }
    .btn-submit { background: green; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer; }
    .btn-submit:hover { background: darkgreen; }
    body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: #fdfdfd;
}

header {
  background: linear-gradient(90deg, #ff5722, #ff9800);
  color: white;
  padding: 20px;
  text-align: center;
}

.item {
  transition: transform 0.3s ease;
}
.item:hover {
  transform: scale(1.05);
}
button {
  background: #ff5722;
  transition: background 0.3s ease;
}
button:hover {
  background: #d84315;
}
@media (max-width: 768px) {
  .menu {
    flex-direction: column;
    align-items: center;
  }
  .item {
    width: 90%;
  }
}

  </style>

  <!-- Cart Section -->
  <div class="cart">
    <h2>🛒 Your Cart</h2>
    <ul id="cart-list"></ul>
    <p><strong>Total: ₹<span id="total">0</span></strong></p>
  </div>

  <!-- Checkout Section -->
  <div class="checkout">
    <h2>📦 Checkout</h2>
    <form onsubmit="placeOrder(event)">
      <label>Name:</label>
      <input type="text" id="name" required>
      <label>Address:</label>
      <textarea id="address" required></textarea>
      <label>Phone:</label>
      <input type="text" id="phone" required>
      <button class="btn-submit" type="submit">Place Order</button>
    </form>
    <p id="order-message" style="color:green; font-weight:bold;"></p>
  </div>

  <script>
    let total = 0;
    let cartItems = [];

    function addToCart(item, price) {
      cartItems.push({item, price});
      const cartList = document.getElementById('cart-list');
      const li = document.createElement('li');
      li.textContent = `${item} - ₹${price}`;
      cartList.appendChild(li);
      total += price;
      document.getElementById('total').textContent = total;
    }

    function placeOrder(event) {
      event.preventDefault();
      const name = document.getElementById('name').value;
      const address = document.getElementById('address').value;
      const phone = document.getElementById('phone').value;

      if(cartItems.length === 0) {
        alert("Your cart is empty!");
        return;
      }

      document.getElementById('order-message').textContent =
        `Thank you ${name}! Your order has been placed. Delivery to ${address}. 📞 ${phone}`;
      
      // Reset cart
      cartItems = [];
      total = 0;
      document.getElementById('cart-list').innerHTML = "";
      document.getElementById('total').textContent = "0";
      document.querySelector("form").reset();
    }
  </script>
